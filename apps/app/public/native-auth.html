<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signing in — FindMyBins</title>
<!--
  Native OAuth relay (handoff model).

  Base44 rejects custom schemes as redirect domains, so native sign-in returns
  to this https page. Rather than try to bounce the token back to the app via a
  custom scheme (unreliable in Expo Go, where the scheme reloads the project and
  drops the token), this page STORES the token server-side under the unguessable
  handoff id the app passed in `state`. The app polls `api/auth-handoff claim`
  and picks it up. The user just closes this tab / taps Done.
-->
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 24px;
    font-family: -apple-system, system-ui, Roboto, sans-serif;
    background: #F4F6F8; color: #17212B;
  }
  .card {
    width: 100%; max-width: 340px; text-align: center;
    background: #fff; border-radius: 16px; padding: 28px 22px;
    box-shadow: 0 1px 2px rgba(16,24,32,.04), 0 6px 16px rgba(16,24,32,.06);
  }
  h1 { font-size: 18px; margin: 0 0 8px; }
  p { font-size: 14px; line-height: 1.5; color: #64707C; margin: 0; }
  .err { color: #C4453B; }
  @media (prefers-color-scheme: dark) {
    body { background: #1B222B; color: #EDF1F5; }
    .card { background: #212A33; box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 18px rgba(0,0,0,.5); }
    p { color: #94A3B2; }
    .err { color: #E06A61; }
  }
</style>
</head>
<body>
<div class="card">
  <h1 id="title">Signing you in…</h1>
  <p id="msg">One moment.</p>
</div>
<script>
(function () {
  var APP_ID = "6a5fd45e9129f5171ccbb963";
  var title = document.getElementById("title");
  var msg = document.getElementById("msg");

  function param(name) {
    var re = new RegExp("[?&#]" + name + "=([^&#]*)");
    var m = re.exec(window.location.search) || re.exec(window.location.hash);
    return m ? decodeURIComponent(m[1]) : null;
  }
  function fail(text) {
    title.textContent = "Couldn't finish signing in";
    title.className = "err";
    msg.textContent = text;
  }
  function done() {
    title.textContent = "You're signed in";
    msg.textContent = "Return to FindMyBins — it's finishing up. You can close this tab.";
  }

  var handoff = param("handoff");
  var token = param("access_token");

  if (!handoff || !/^[0-9A-Za-z]{32}$/.test(handoff)) return fail("Missing sign-in reference. Please try again from the app.");
  if (!token) return fail("No sign-in token was returned. Please try again.");

  fetch("https://base44.app/api/apps/" + APP_ID + "/functions/api/auth-handoff", {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-App-Id": APP_ID },
    body: JSON.stringify({ action: "store", payload: { handoff_id: handoff, access_token: token } })
  }).then(function (r) {
    if (!r.ok) throw new Error("store failed " + r.status);
    return r.json();
  }).then(function () {
    done();
  }).catch(function () {
    fail("We couldn't complete sign-in. Please try again.");
  });
})();
</script>
</body>
</html>
